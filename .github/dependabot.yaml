---
version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    groups:
      github-actions:
        patterns:
          - '*'
    schedule:
      interval: weekly
    commit-message:
      prefix: deps(github-actions)

  - package-ecosystem: npm
    directory: /
    groups:
      astro-packages:
        patterns:
          - '@astrojs/*'
          - astro
          - astro-*
      tailwind-packages:
        patterns:
          - '@tailwindcss/*'
          - tailwindcss
          - tailwind-merge
        dependency-type: development
      prod-deps:
        exclude-patterns:
          - '@astrojs/*'
          - astro
          - astro-*
          - '@tailwindcss/*'
          - tailwindcss
        dependency-type: production
      dev-deps:
        exclude-patterns:
          - '@tailwindcss/*'
          - tailwindcss
          - tailwind-merge
        dependency-type: development
    schedule:
      interval: weekly
    commit-message:
      prefix: deps(prod)
      prefix-development: deps(dev)
